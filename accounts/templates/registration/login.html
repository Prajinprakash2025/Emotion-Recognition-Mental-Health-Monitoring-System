{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — MindMonitor AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3.0">
</head>
<body class="dark-theme">

<div class="auth-page">
    <div class="auth-card glass-card">
        <div class="text-center mb-4">
            <div class="brand-icon mx-auto mb-3"><i class="bi bi-activity"></i></div>
            <h3 class="text-white fw-bold">Welcome Back</h3>
            <p class="text-white-50 small">Sign in to your MindMonitor AI account.</p>
        </div>

        {% if form.errors %}
        <div class="alert py-2 small rounded-3 mb-3" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;">
            <i class="bi bi-exclamation-circle me-2"></i>Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="text-white-50 small mb-1">Username</label>
                <input type="text" name="username" class="form-control glass-input" placeholder="Enter your username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="text-white-50 small mb-1">Password</label>
                <input type="password" name="password" class="form-control glass-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-4">
            <span class="text-white-50 small">Don't have an account? </span>
            <a href="{% url 'signup' %}" class="text-accent text-decoration-none small fw-bold">Create one</a>
        </div>
        <div class="text-center mt-2">
            <a href="{% url 'home' %}" class="text-white-50 small text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Back to Home
            </a>
        </div>
    </div>
</div>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
